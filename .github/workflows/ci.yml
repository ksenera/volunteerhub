name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: volunteerhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d volunteerhub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      # Coverage makes the test result measurable instead of only pass/fail.
      - name: Run frontend tests with coverage
        working-directory: client
        run: npm run test:coverage

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        working-directory: server
        run: pip install -r requirements.txt

      # The terminal report is retained in the Actions log for later comparison.
      - name: Run backend tests with coverage
        working-directory: server
        env:
          POSTGRES_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/volunteerhub_test
        run: pytest --cov=backend --cov-report=term-missing

      - name: Run mock summary evaluation thresholds
        working-directory: server
        env:
          AI_PROVIDER: mock
        run: python -m evals.evaluate_summaries --samples 50 --min-success-rate 100 --min-field-coverage 100
